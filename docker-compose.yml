services:
  rythmx:
    build: .
    container_name: rythmx
    ports:
      - "8010:8009"
    volumes:
      # SoulSync DB — READ ONLY. Direct bind mount to SoulSync's data folder on the host.
      - /mnt/user/appdata/soulsync/data:/data/soulsync:ro
      # rythmx's own data (rythmx.db)
      - ./data:/data/rythmx
      # Plugin directory — bind-mounted so plugins can be added/updated without rebuild.
      - ./plugins:/app/plugins
      # Music library — writable; the file mover copies completed FLACs here.
      # Must match FILE_MOVER_DEST (from .env/.compose env or Settings → Integrations).
      # Uncomment and set to the path your media server (Plex/Navidrome) watches.
      # - /mnt/user/data/media/music:/music
      # Tidarr download output — read-only; Core reads FLACs after Tidarr completes.
      # Must be the same host directory Tidarr mounts as its download destination.
      # Set FILE_MOVER_LOCAL_PREFIX=/app/downloads in .env or Settings → Integrations → Tidarr.
      # - /mnt/user/downloads:/app/downloads:ro
    env_file:
      - .env
    environment:
      # PUID/PGID — match your host's file ownership.
      # Unraid: 99/100 | TrueNAS: 568/568 | Linux: 1000/1000
      PUID: 99
      PGID: 100
      # Local artwork cache root (inside mounted rythmx data volume).
      # Override in .env if you want a different location.
      ARTWORK_DIR: ${ARTWORK_DIR:-/data/rythmx/artwork}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
