          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

# ── Components ───────────────────────────────────────────────────────────────

components:

  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-Api-Key
      description: >
        Auto-generated API key. View or regenerate in Settings.
        Included as `X-Api-Key: <key>` on every request.

  parameters:

    PlaylistName:
      name: name
      in: path
      required: true
      description: Playlist name (URL-encoded; may contain spaces and special characters)
      schema:
        type: string

    Period:
      name: period
      in: query
      schema:
        $ref: '#/components/schemas/Period'

    Limit:
      name: limit
      in: query
      schema:
        type: integer
        default: 50

  responses:

    Unauthorized:
      description: Missing or invalid API key
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'

    Ok:
      description: Operation succeeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiSuccess'

    Accepted:
      description: Background operation triggered
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ApiSuccess'
              - type: object
                required: [is_alive]
                properties:
                  is_alive:
                    type: boolean

    BadRequest:
      description: Invalid request body or parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'

    Conflict:
      description: Operation already in progress or resource conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'

    ServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'

  schemas:

    # ── Primitives / Enums ──────────────────────────────────────────────────

    Period:
      type: string
      enum: [7day, 1month, 3month, 6month, 12month, overall]

    AcquisitionStatus:
      type: string
      enum: [pending, submitted, found, failed, skipped]

    ReleaseKind:
      type: string
      enum: [album, ep, single, compilation]

    LibraryPlatform:
      type: string
      enum: [plex, jellyfin, navidrome]

    PlaylistSource:
      type: string
      enum: [taste, lastfm, spotify, deezer, empty, new_music]

    ImageType:
      type: string
      enum: [artist, album, track]

    # ── Envelope ────────────────────────────────────────────────────────────

    ApiSuccess:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]

    ApiError:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [error]
        message:
          type: string
        error:
          type: string

    # ── Music Entities ───────────────────────────────────────────────────────

    Artist:
      type: object
      required: [name]
      properties:
        name:
          type: string
        image:
          type: string
        playcount:
          type: integer
        url:
          type: string

    TopAlbum:
      type: object
      required: [artist, title]
      properties:
        artist:
          type: string
        title:
          type: string
        image:
          type: string
        playcount:
          type: integer

    Track:
      type: object
      required: [name, artist]
      properties:
        name:
          type: string
        artist:
          type: string
        album:
          type: string
        image:
          type: string
        playcount:
          type: integer
        duration:
          type: integer
          description: Duration in seconds
        is_owned:
          type: boolean
        score:
          type: number
          format: float
        rank:
          type: integer

    # ── Acquisition ──────────────────────────────────────────────────────────

    QueueItem:
      type: object
      required: [id, artist, album, kind, status]
      properties:
        id:
          oneOf:
            - type: string
            - type: integer
        artist:
          type: string
        album:
          type: string
        kind:
          $ref: '#/components/schemas/ReleaseKind'
        status:
          $ref: '#/components/schemas/AcquisitionStatus'
        requested_by:
          type: string
        requested_at:
          type: string
          format: date-time
        release_date:
          type: string

    AcquisitionStats:
      type: object
      required: [pending, submitted, found, failed, skipped, total]
      properties:
        pending:
          type: integer
        submitted:
          type: integer
        found:
          type: integer
        failed:
          type: integer
        skipped:
          type: integer
        total:
          type: integer

    # ── Playlists ────────────────────────────────────────────────────────────

    PlaylistItem:
      type: object
      required: [name]
      properties:
        name:
          type: string
        source:
          $ref: '#/components/schemas/PlaylistSource'
        last_synced:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        mode:
          type: string
        auto_sync:
          type: boolean
        track_count:
          type: integer
        owned_count:
          type: integer
        max_tracks:
          type: integer
        source_url:
          type: string

    PlaylistTrack:
      type: object
      required: [name, artist, is_owned]
      properties:
        row_id:
          type: integer
        name:
          type: string
        artist:
          type: string
        album:
          type: string
        image:
          type: string
        is_owned:
          type: boolean
        score:
          type: number
          format: float
        acquisition_status:
          $ref: '#/components/schemas/AcquisitionStatus'

    # ── Cruise Control ───────────────────────────────────────────────────────

    CruiseControlConfig:
      type: object
      properties:
        run_mode:
          type: string
          enum: [build, fetch]
        playlist_prefix:
          type: string
        min_listens:
          type: integer
        period:
          $ref: '#/components/schemas/Period'
        lookback_days:
          type: integer
        max_per_cycle:
          type: integer
        max_playlist_tracks:
          type: integer
        auto_push_playlist:
          type: boolean
        schedule_weekday:
          type: integer
          minimum: 0
          maximum: 6
        schedule_hour:
          type: integer
          minimum: 0
          maximum: 23
        enabled:
          type: boolean
        dry_run:
          type: boolean
        release_cache_refresh_weekday:
          type: integer
          minimum: 0
          maximum: 6
        release_cache_refresh_hour:
          type: integer
          minimum: 0
          maximum: 23
        nr_ignore_keywords:
          type: string
        nr_ignore_artists:
          type: string
        include_features:
          type: boolean
        release_kinds:
          type: string
          description: Comma-separated list of ReleaseKind values to include

    CruiseControlStatus:
      type: object
      required: [state]
      properties:
        state:
          type: string
          enum: [idle, running, error, completed]
        stage:
          type: integer
        stage_label:
          type: string
        total_stages:
          type: integer
        last_run:
          type: string
          format: date-time
        summary:
          type: object
          properties:
            artists_checked:
              type: integer
            new_releases:
              type: integer
            owned:
              type: integer
            queued:
              type: integer
        error:
          type: string

    HistoryItem:
      type: object
      required: [artist, album, status, date]
      properties:
        artist:
          type: string
        album:
          type: string
        status:
          type: string
          enum: [owned, queued, skipped]
        reason:
          type: string
        date:
          type: string
          format: date-time

    # ── Images ───────────────────────────────────────────────────────────────

    ImageResolveResponse:
      type: object
      properties:
        image_url:
          type: string
          description: Resolved CDN or local URL
        content_hash:
          type: string
          description: SHA-256 hex hash of the artwork blob; use with /api/v1/artwork/{hash}
          nullable: true
        pending:
          type: boolean
          description: True if the background fetch is still in progress; caller should retry

    # ── Stats ────────────────────────────────────────────────────────────────

    StatsSummary:
      type: object
      required: [top_artist, total_artists]
      properties:
        top_artist:
          type: string
        total_artists:
          type: integer
        total_plays:
          type: integer

    # ── Settings ─────────────────────────────────────────────────────────────

    Settings:
      type: object
      required: [library_platform]
      properties:
        lastfm_username:
          type: string
        lastfm_api_key:
          type: string
        plex_url:
          type: string
        plex_token:
          type: string
        soulsync_url:
          type: string
        spotify_client_id:
          type: string
        spotify_client_secret:
          type: string
        library_platform:
          $ref: '#/components/schemas/LibraryPlatform'

    ConnectionStatus:
      type: object
      required: [connected]
      properties:
        connected:
          type: boolean
        message:
          type: string

    # ── Library Enrichment ───────────────────────────────────────────────────

    LibraryStatus:
      type: object
      required: [platform, track_count]
      properties:
        platform:
          $ref: '#/components/schemas/LibraryPlatform'
        track_count:
          type: integer
        last_synced:
          type: string
          format: date-time
        synced:
          type: boolean
        total_albums:
          type: integer
        enriched_albums:
          type: integer
        enrich_pct:
          type: number
          format: float

    LibraryEnrichStatus:
      allOf:
        - $ref: '#/components/schemas/LibraryStatus'
        - type: object
          required: [enrich_running]
          properties:
            enrich_running:
              type: boolean

    EnrichmentWorkerStatus:
      type: object
      required: [found, not_found, errors, pending]
      properties:
        found:
          type: integer
        not_found:
          type: integer
        errors:
          type: integer
        pending:
          type: integer

    EnrichmentPipelineStatus:
      type: object
      required: [running]
      properties:
        running:
          type: boolean
        started_at:
          type: [string, 'null']
          format: date-time
          description: ISO 8601 UTC timestamp set when run_full() is called; null when not running
        workers:
          type: object
          description: Per-worker progress keyed by worker name
          properties:
            library:        { $ref: '#/components/schemas/EnrichmentWorkerStatus' }
            itunes_rich:    { $ref: '#/components/schemas/EnrichmentWorkerStatus' }
            deezer_rich:    { $ref: '#/components/schemas/EnrichmentWorkerStatus' }
            spotify_id:     { $ref: '#/components/schemas/EnrichmentWorkerStatus' }
            spotify_genres: { $ref: '#/components/schemas/EnrichmentWorkerStatus' }
            lastfm_id:      { $ref: '#/components/schemas/EnrichmentWorkerStatus' }
            lastfm_tags:    { $ref: '#/components/schemas/EnrichmentWorkerStatus' }
            lastfm_stats:   { $ref: '#/components/schemas/EnrichmentWorkerStatus' }

    # ── Library Browse ────────────────────────────────────────────────────────

    LibArtist:
      type: object
      required: [id, name, album_count, match_confidence]
      properties:
        id:
          type: string
        name:
          type: string
        album_count:
          type: integer
        match_confidence:
          type: number
          format: float
        source_platform:
          type: [string, 'null']
        lastfm_tags_json:
          type: [string, 'null']
          description: JSON-encoded array of Last.fm tag strings
        genres_json:
          type: [string, 'null']
          description: JSON-encoded array of Spotify genre strings
        popularity:
          type: [integer, 'null']
          description: Spotify popularity score (0–100)
        listener_count:
          type: [integer, 'null']
          description: Last.fm listener count
        global_play_count:
          type: [integer, 'null']
          description: Last.fm global play count

    LibAlbum:
      type: object
      required: [id, artist_id, artist_name, title, match_confidence, needs_verification]
      properties:
        id:
          type: string
        artist_id:
          type: string
        artist_name:
          type: string
        title:
          type: string
        year:
          type: [integer, 'null']
        record_type:
          type: [string, 'null']
        match_confidence:
          type: number
          format: float
        needs_verification:
          type: integer
        source_platform:
          type: [string, 'null']
        release_date:
          type: [string, 'null']
          format: date
        genre:
          type: [string, 'null']
        thumb_url:
          type: [string, 'null']
        lastfm_tags_json:
          type: [string, 'null']
          description: JSON-encoded array of Last.fm tag strings

    LibTrack:
      type: object
      required: [id, album_id, artist_id, title, rating, play_count]
      properties:
        id:
          type: string
        album_id:
          type: string
        artist_id:
          type: string
        title:
          type: string
        track_number:
          type: [integer, 'null']
        disc_number:
          type: [integer, 'null']
        duration:
          type: [integer, 'null']
          description: Duration in seconds
        rating:
          type: integer
          description: User star rating (0–5)
        play_count:
          type: integer
        tempo:
          type: [number, 'null']
          format: float
          description: BPM from Deezer enrichment
        album_title:
          type: string
        artist_name:
          type: string

    AuditEnrichmentMeta:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [found, not_found, error, fallback, pending]
        confidence:
          type: [number, 'null']
          format: float

    AuditItem:
      type: object
      required: [artist_id, artist_name, album_id, album_title, needs_verification]
      properties:
        artist_id:
          type: string
        artist_name:
          type: string
        album_id:
          type: string
        album_title:
          type: string
        match_confidence:
          type: [number, 'null']
          format: float
        needs_verification:
          type: boolean
        itunes_album_id:
          type: [string, 'null']
        deezer_id:
          type: [string, 'null']
        enrichment:
          type: object
          description: Map of source name to enrichment status
          additionalProperties:
            $ref: '#/components/schemas/AuditEnrichmentMeta'

    # ── Discovery ────────────────────────────────────────────────────────────

    PersonalDiscoveryConfig:
      type: object
      properties:
        closeness:
          type: number
          format: float
        seed_period:
          $ref: '#/components/schemas/Period'
        min_scrobbles:
          type: integer
        max_tracks:
          type: integer

    PersonalDiscoveryResult:
      type: object
      required: [artist]
      properties:
        artist:
          type: string
        image:
          type: string
        reason:
          type: string
        similarity:
          type: number
          format: float
        tags:
          type: array
          items:
            type: string
