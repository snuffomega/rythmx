openapi: 3.1.0

info:
  title: Rythmx API
  version: 1.0.0
  description: >
    Self-hosted music automation and library management API.
    All endpoints under `/api/v1/` follow a standard envelope:
    success responses include `"status": "ok"` plus payload fields;
    error responses include `"status": "error"` and `"message"`.
    Background-triggering endpoints return HTTP 202 with `"is_alive": bool`.

servers:
  - url: /
    description: Rythmx server (all paths are absolute)

# All endpoints require an API key (X-Api-Key header) except /health
security:
  - ApiKeyAuth: []

tags:
  - name: health
    description: Server health check
  - name: discovery
    description: Music discovery pool and playlist management
  - name: cruise-control
    description: Cruise Control pipeline — automated new release acquisition
  - name: release-cache
    description: Release cache management
  - name: acquisition
    description: Acquisition queue — tracks pending download
  - name: images
    description: Image resolution and cache warming
  - name: playlists
    description: Playlist CRUD, build, import, publish, and export
  - name: stats
    description: Last.fm listening statistics
  - name: library
    description: Library browse, enrichment pipeline, and audit
  - name: settings
    description: Application settings and library enrichment operations

paths:

  # ── Health ────────────────────────────────────────────────────────────────

  /health:
    get:
      tags: [health]
      summary: Server health check
      operationId: getHealth
      security: []  # Public — no auth required
      responses:
        '200':
          description: Server is up
          content:
            application/json:
              schema:
                type: object
                required: [status, db_connected, wal_mode]
                properties:
                  status:
                    type: string
                    enum: [ok]
                  db_connected:
                    type: boolean
                  wal_mode:
                    type: boolean

  # ── Auth ──────────────────────────────────────────────────────────────────

  /api/v1/auth/bootstrap:
    get:
      tags: [health]
      summary: Bootstrap API key for the web UI
      description: >
        Public endpoint — no authentication required. Returns the active API key
        so the browser-based web UI can seed its X-Api-Key header on startup.
        All subsequent API calls from the UI will include the key automatically.
      operationId: bootstrapApiKey
      security: []
      responses:
        '200':
          description: Active API key
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    required: [api_key]
                    properties:
                      api_key:
                        type: string
        '503':
          description: API key not yet initialized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  # ── Discovery ─────────────────────────────────────────────────────────────

  /api/v1/discovery/candidates:
    get:
      tags: [discovery]
      summary: Get discovery pool candidates
      operationId: getDiscoveryCandidates
      parameters:
        - name: period
          in: query
          schema:
            $ref: '#/components/schemas/Period'
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Scored candidate tracks
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      candidates:
                        type: array
                        items:
                          $ref: '#/components/schemas/Track'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/v1/discovery/playlist:
    get:
      tags: [discovery]
      summary: Get current discovery playlist tracks
      operationId: getDiscoveryPlaylist
      responses:
        '200':
          description: Discovery playlist tracks
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      tracks:
                        type: array
                        items:
                          $ref: '#/components/schemas/Track'
        '500':
          $ref: '#/components/responses/ServerError'
    post:
      tags: [discovery]
      summary: Add a track to the discovery playlist
      operationId: addDiscoveryTrack
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, artist]
              properties:
                name:
                  type: string
                artist:
                  type: string
      responses:
        '200':
          $ref: '#/components/responses/Ok'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/v1/discovery/playlist/{track_id}:
    delete:
      tags: [discovery]
      summary: Remove a track from the discovery playlist
      operationId: deleteDiscoveryTrack
      parameters:
        - name: track_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          $ref: '#/components/responses/Ok'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/v1/discovery/download:
    post:
      tags: [discovery]
      summary: Queue a discovery track for download via SoulSync
      operationId: downloadDiscoveryTrack
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, artist]
              properties:
                name:
                  type: string
                artist:
                  type: string
      responses:
        '200':
          $ref: '#/components/responses/Ok'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/v1/discovery/publish:
    post:
      tags: [discovery]
      summary: Publish discovery playlist to Plex
      operationId: publishDiscoveryPlaylist
      responses:
        '200':
          $ref: '#/components/responses/Ok'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/v1/discovery/export:
    post:
      tags: [discovery]
      summary: Export discovery playlist as M3U file
      operationId: exportDiscoveryPlaylist
      responses:
        '200':
          description: M3U playlist file download
          content:
            audio/x-mpegurl:
              schema:
                type: string
                format: binary
        '500':
          $ref: '#/components/responses/ServerError'

  # ── Cruise Control ────────────────────────────────────────────────────────

  /api/v1/cruise-control/status:
    get:
      tags: [cruise-control]
      summary: Get Cruise Control pipeline run status
      operationId: getCruiseControlStatus
      responses:
        '200':
          description: Current CC pipeline status
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - $ref: '#/components/schemas/CruiseControlStatus'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/v1/cruise-control/config:
    get:
      tags: [cruise-control]
      summary: Get Cruise Control configuration
      operationId: getCruiseControlConfig
      responses:
        '200':
          description: CC configuration with defaults
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - $ref: '#/components/schemas/CruiseControlConfig'
        '500':
          $ref: '#/components/responses/ServerError'
    post:
      tags: [cruise-control]
      summary: Save Cruise Control configuration
      operationId: saveCruiseControlConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CruiseControlConfig'
      responses:
        '200':
          $ref: '#/components/responses/Ok'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/v1/cruise-control/run-now:
    post:
      tags: [cruise-control]
      summary: Trigger a Cruise Control cycle immediately
      operationId: runCruiseControlNow
      responses:
        '202':
          $ref: '#/components/responses/Accepted'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/v1/cruise-control/history:
    get:
      tags: [cruise-control]
      summary: Get Cruise Control run history
      operationId: getCruiseControlHistory
      responses:
        '200':
          description: CC run history entries
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      history:
                        type: array
                        items:
                          $ref: '#/components/schemas/HistoryItem'
        '500':
          $ref: '#/components/responses/ServerError'

  # ── Release Cache ─────────────────────────────────────────────────────────

  /api/v1/release-cache/clear:
    post:
      tags: [release-cache]
      summary: Clear the release cache
      operationId: clearReleaseCache
      responses:
        '200':
          $ref: '#/components/responses/Ok'
        '500':
          $ref: '#/components/responses/ServerError'

  # ── Acquisition ───────────────────────────────────────────────────────────

  /api/v1/acquisition/queue:
    get:
      tags: [acquisition]
      summary: Get acquisition queue
      operationId: getAcquisitionQueue
      parameters:
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/AcquisitionStatus'
        - name: playlist
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Acquisition queue items
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      queue:
                        type: array
                        items:
                          $ref: '#/components/schemas/QueueItem'
        '500':
          $ref: '#/components/responses/ServerError'
    post:
      tags: [acquisition]
      summary: Add an item to the acquisition queue
      operationId: addAcquisitionItem
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [artist, album, kind]
              properties:
                artist:
                  type: string
                album:
                  type: string
                kind:
                  $ref: '#/components/schemas/ReleaseKind'
      responses:
        '200':
          $ref: '#/components/responses/Ok'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/v1/acquisition/stats:
    get:
      tags: [acquisition]
      summary: Get acquisition queue statistics
      operationId: getAcquisitionStats
      responses:
        '200':
          description: Queue counts by status
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - $ref: '#/components/schemas/AcquisitionStats'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/v1/acquisition/check-now:
    post:
      tags: [acquisition]
      summary: Trigger the acquisition worker immediately
      operationId: checkAcquisitionNow
      responses:
        '202':
          $ref: '#/components/responses/Accepted'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/ServerError'

  # ── Images ────────────────────────────────────────────────────────────────

  /api/v1/images/resolve:
    post:
      tags: [images]
      summary: Resolve image URL for a music entity
      operationId: resolveImage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, name]
              properties:
                type:
                  $ref: '#/components/schemas/ImageType'
                name:
                  type: string
                artist:
                  type: string
      responses:
        '200':
          description: Resolved or pending image URL
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - $ref: '#/components/schemas/ImageResolveResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/v1/images/warm-cache:
    post:
      tags: [images]
      summary: Proactively warm the image cache
      operationId: warmImageCache
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [items]
              properties:
                items:
                  type: array
                  items:
                    type: object
                    required: [type, name]
                    properties:
                      type:
                        $ref: '#/components/schemas/ImageType'
                      name:
                        type: string
                      artist:
                        type: string
      responses:
        '200':
          $ref: '#/components/responses/Ok'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/v1/images/resolve-batch:
    post:
      tags: [images]
      summary: Batch-resolve image URLs for multiple music entities
      description: >
        Resolves image URLs for up to 50 entities in a single round-trip.
        Each item gets an independent (url, content_hash, pending) response.
        Items with pending=true should be retried after 3-6 seconds.
      operationId: resolveImageBatch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [items]
              properties:
                items:
                  type: array
                  maxItems: 50
                  items:
                    type: object
                    required: [type, name]
                    properties:
                      id:
                        type: string
                        description: Caller-supplied correlation ID echoed back in the response
                      type:
                        $ref: '#/components/schemas/ImageType'
                      name:
                        type: string
                      artist:
                        type: string
      responses:
        '200':
          description: Batch of resolved or pending image URLs
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items:
                          allOf:
                            - $ref: '#/components/schemas/ImageResolveResponse'
                            - type: object
                              properties:
                                id:
                                  type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/v1/artwork/{content_hash}:
    get:
      tags: [images]
      summary: Serve artwork thumbnail as WebP
      description: >
        Serves a WebP thumbnail from local content-addressed storage.
        Generates the thumbnail on cache miss from the stored original.
        Responds with Cache-Control: public, max-age=31536000, immutable.
      operationId: getArtwork
      parameters:
        - name: content_hash
          in: path
          required: true
          schema:
            type: string
          description: SHA-256 hex hash of the artwork blob
        - name: s
          in: query
          required: false
          schema:
            type: integer
            minimum: 32
            maximum: 2048
            default: 300
          description: Thumbnail size in pixels (square)
      responses:
        '200':
          description: WebP image thumbnail
          content:
            image/webp:
              schema:
                type: string
                format: binary
        '400':
          description: Invalid hash format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Artwork not found for hash
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '503':
          description: Image processing failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  # ── Playlists ─────────────────────────────────────────────────────────────

  /api/v1/playlists:
    get:
      tags: [playlists]
      summary: List all playlists
      operationId: listPlaylists
      responses:
        '200':
          description: All playlists
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      playlists:
                        type: array
                        items:
                          $ref: '#/components/schemas/PlaylistItem'
        '500':
          $ref: '#/components/responses/ServerError'
    post:
      tags: [playlists]
      summary: Create a new playlist
      operationId: createPlaylist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, source]
              properties:
                name:
                  type: string
                source:
                  $ref: '#/components/schemas/PlaylistSource'
                mode:
                  type: string
                max_tracks:
                  type: integer
                auto_sync:
                  type: boolean
                source_url:
                  type: string
      responses:
        '200':
          $ref: '#/components/responses/Ok'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/v1/playlists/{name}:
    delete:
      tags: [playlists]
      summary: Delete a playlist
      operationId: deletePlaylist
      parameters:
        - $ref: '#/components/parameters/PlaylistName'
      responses:
        '200':
          $ref: '#/components/responses/Ok'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    patch:
      tags: [playlists]
      summary: Update playlist metadata
      operationId: updatePlaylist
      parameters:
        - $ref: '#/components/parameters/PlaylistName'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                auto_sync:
                  type: boolean
                mode:
                  type: string
                max_tracks:
                  type: integer
      responses:
        '200':
          $ref: '#/components/responses/Ok'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/v1/playlists/{name}/tracks:
    get:
      tags: [playlists]
      summary: Get tracks in a playlist
      operationId: getPlaylistTracks
      parameters:
        - $ref: '#/components/parameters/PlaylistName'
      responses:
        '200':
          description: Playlist tracks
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      tracks:
                        type: array
                        items:
                          $ref: '#/components/schemas/PlaylistTrack'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/v1/playlists/{name}/tracks/{row_id}:
    delete:
      tags: [playlists]
      summary: Remove a single track from a playlist
      operationId: deletePlaylistTrack
      parameters:
        - $ref: '#/components/parameters/PlaylistName'
        - name: row_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          $ref: '#/components/responses/Ok'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/v1/playlists/{name}/build:
    post:
      tags: [playlists]
      summary: Build or rebuild a taste-based playlist
      operationId: buildPlaylist
      parameters:
        - $ref: '#/components/parameters/PlaylistName'
      responses:
        '200':
          $ref: '#/components/responses/Ok'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/v1/playlists/{name}/rebuild:
    post:
      tags: [playlists]
      summary: Rebuild playlist (alias for /build)
      operationId: rebuildPlaylist
      parameters:
        - $ref: '#/components/parameters/PlaylistName'
      responses:
        '200':
          $ref: '#/components/responses/Ok'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/v1/playlists/{name}/import:
    post:
      tags: [playlists]
      summary: Import tracks from an external source (Spotify / Last.fm / Deezer)
      operationId: importPlaylist
      parameters:
        - $ref: '#/components/parameters/PlaylistName'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [source]
              properties:
                source:
                  $ref: '#/components/schemas/PlaylistSource'
                url:
                  type: string
      responses:
        '200':
          $ref: '#/components/responses/Ok'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/v1/playlists/{name}/sync:
    post:
      tags: [playlists]
      summary: Sync playlist from external source (alias for /import)
      operationId: syncPlaylist
      parameters:
        - $ref: '#/components/parameters/PlaylistName'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [source]
              properties:
                source:
                  $ref: '#/components/schemas/PlaylistSource'
                url:
                  type: string
      responses:
        '200':
          $ref: '#/components/responses/Ok'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/v1/playlists/{name}/publish:
    post:
      tags: [playlists]
      summary: Publish playlist to Plex
      operationId: publishPlaylist
      parameters:
        - $ref: '#/components/parameters/PlaylistName'
      responses:
        '200':
          $ref: '#/components/responses/Ok'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/v1/playlists/{name}/export:
    post:
      tags: [playlists]
      summary: Export playlist as M3U file
      operationId: exportPlaylist
      parameters:
        - $ref: '#/components/parameters/PlaylistName'
      responses:
        '200':
          description: M3U playlist file download
          content:
            audio/x-mpegurl:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/v1/playlists/{name}/settings:
    post:
      tags: [playlists]
      summary: Update playlist auto_sync and mode settings
      operationId: updatePlaylistSettings
      parameters:
        - $ref: '#/components/parameters/PlaylistName'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                auto_sync:
                  type: boolean
                mode:
                  type: string
      responses:
        '200':
          $ref: '#/components/responses/Ok'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  # ── Stats ─────────────────────────────────────────────────────────────────

  /api/v1/stats/top-artists:
    get:
      tags: [stats]
      summary: Get top artists from Last.fm
      operationId: getTopArtists
      parameters:
        - $ref: '#/components/parameters/Period'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Top artists
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      artists:
                        type: array
                        items:
                          $ref: '#/components/schemas/Artist'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/v1/stats/top-tracks:
    get:
      tags: [stats]
      summary: Get top tracks from Last.fm
      operationId: getTopTracks
      parameters:
        - $ref: '#/components/parameters/Period'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Top tracks
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiSuccess'
                  - type: object
                    properties:
                      tracks:
                        type: array
                        items:
                          $ref: '#/components/schemas/Track'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/v1/stats/top-albums:
    get:
      tags: [stats]
      summary: Get top albums from Last.fm
      operationId: getTopAlbums
      parameters:
