      tags: [discovery]
      summary: Run personal discovery (stub — not yet implemented)
      operationId: runPersonalDiscovery
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PersonalDiscoveryConfig'
      responses:
        '200':
          description: Discovery results
          content:
